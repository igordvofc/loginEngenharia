<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Google</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header>
    <img class="imagemGoogle" src="img/google.png" alt="">
    </header>

    <main>
        <div class="container">
            <h1>Login</h1>
            <br>
            <label for="">Usuário</label>
            <br>
            <input type="text" placeholder="Digite o seu Usuário" id="inputUsuario">
            <br>
            <label for="">Senha</label>
            <br>
            <input type="password" placeholder="Digite a sua Senha" id="inputSenha">
            <br><br>
            <button onclick="logar()">Entrar</button>
        </div>
    </main>

    <footer>
        <p>Entre em contato com o suporte</p>
        <img class="imagemWhatsapp" src="img/whatsapp.png" alt="">
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
